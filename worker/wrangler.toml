name = "f1slam-leaderboard"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Branded endpoint on the project's own domain (avoids the account-wide
# *.workers.dev subdomain). Cloudflare provisions the DNS record + TLS cert.
[[routes]]
pattern = "api.f1slam.com"
custom_domain = true

# Created with: wrangler kv namespace create LEADERBOARD
# then paste the returned id below.
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
ALLOWED_ORIGIN = "https://f1slam.com"
