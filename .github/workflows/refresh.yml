name: Refresh F1 data

# Re-runs the OpenF1 pipeline and commits the updated snapshot. The deploy
# workflow then redeploys automatically on the resulting push. Scheduled for
# Monday mornings (UTC) so it picks up each weekend's race.
on:
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Best-effort: if OpenF1 is unreachable, keep the committed snapshot.
      - name: Rebuild snapshot from OpenF1
        run: npm run data || echo "data refresh skipped — keeping committed snapshot"
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --staged --quiet || git commit -m "data: weekly OpenF1 refresh"
          git push
