name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The F1 snapshot is committed under web/public/data, so the build is
      # pure-static and needs no network access here. Regenerate the large
      # build-only race archive (web/races.json) from it — it's derived data,
      # so it's git-ignored and rebuilt on every deploy.
      - name: Build race archive (derived, build-only)
        run: node pipeline/recompute-ratings.mjs
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://f1slam.com
          NEXT_PUBLIC_LEADERBOARD_URL: ${{ vars.LEADERBOARD_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
